<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Explormint — Freshly Minted Itineraries</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: #FAF7F0;
      background-image: url("data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20width%3D%27340%27%20height%3D%27340%27%20viewBox%3D%270%200%20340%20340%27%3E%3Cg%20fill%3D%27none%27%20stroke%3D%27%23bcd9c6%27%20stroke-width%3D%271.7%27%3E%3Ccircle%20cx%3D%2766%27%20cy%3D%2770%27%20r%3D%2730%27%20stroke-dasharray%3D%273%204%27%2F%3E%3Ccircle%20cx%3D%2766%27%20cy%3D%2770%27%20r%3D%2722%27%2F%3E%3Cpath%20d%3D%27M54%2078%20L63%2065%20L69%2073%20L78%2062%20L82%2078%20Z%27%20fill%3D%27%23d6ebe0%27%20stroke%3D%27none%27%2F%3E%3Cg%20transform%3D%27rotate%28-12%20250%2082%29%27%3E%3Crect%20x%3D%27218%27%20y%3D%2758%27%20width%3D%2764%27%20height%3D%2748%27%20rx%3D%273%27%20stroke-dasharray%3D%273%204%27%2F%3E%3Cpath%20d%3D%27M250%2068%20l4%209%20l10%201%20l-7%207%20l2%2010%20l-9%20-5%20l-9%205%20l2%20-10%20l-7%20-7%20l10%20-1%20z%27%20fill%3D%27%23d6ebe0%27%20stroke%3D%27none%27%2F%3E%3C%2Fg%3E%3Ccircle%20cx%3D%2790%27%20cy%3D%27250%27%20r%3D%2725%27%20stroke-dasharray%3D%273%204%27%2F%3E%3Cpath%20d%3D%27M90%20236%20l4%209%20l10%201%20l-7%207%20l2%2010%20l-9%20-5%20l-9%205%20l2%20-10%20l-7%20-7%20l10%20-1%20z%27%20fill%3D%27%23d6ebe0%27%20stroke%3D%27none%27%2F%3E%3Ccircle%20cx%3D%27272%27%20cy%3D%27262%27%20r%3D%2718%27%2F%3E%3Cpath%20d%3D%27M262%20268%20L270%20257%20L275%20263%20L281%20255%20L285%20268%20Z%27%20fill%3D%27%23d6ebe0%27%20stroke%3D%27none%27%2F%3E%3C%2Fg%3E%3C%2Fsvg%3E");
      background-attachment: fixed;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Searchable lists of world places and airports (loaded once, outside React for speed) -->
  <datalist id="places"></datalist>
  <datalist id="airports"></datalist>
  <script src="/public/data/places.js"></script>
  <script src="/public/data/airports.js"></script>
  <script>
    (function () {
      function fill(id, arr) {
        var dl = document.getElementById(id);
        if (!dl || !arr) return;
        var frag = document.createDocumentFragment();
        for (var i = 0; i < arr.length; i++) {
          var o = document.createElement("option");
          o.value = arr[i];
          frag.appendChild(o);
        }
        dl.appendChild(frag);
      }
      fill("places", window.PLACES);
      fill("airports", window.AIRPORTS);
    })();
  </script>

  <script type="text/babel">
const { useState, useEffect } = React;

const PRICE_LABEL = "$19.99";

const inputClass = "w-full bg-white border border-[#ddd4c2] rounded-lg px-4 py-3 text-slate-900 placeholder-slate-400 focus:outline-none focus:border-emerald-400 transition-colors text-sm";
const labelClass = "block text-xs font-semibold uppercase tracking-widest text-emerald-600 mb-2";

const STEPS = ["Trip Details", "Travel Style", "Generate"];
const emptyStop = () => ({ destination: "", startDate: "", endDate: "" });
const nightsBetween = (a, b) => Math.round((new Date(b) - new Date(a)) / 86400000 + 1);

function StepIndicator({ current }) {
  return (
    <div className="flex items-center justify-center gap-3 mb-10">
      {STEPS.map((s, i) => (
        <div key={s} className="flex items-center gap-3">
          <div className="flex flex-col items-center gap-1">
            <div className={`w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold transition-all ${i < current ? "bg-emerald-400 text-slate-900" : i === current ? "bg-emerald-400 text-slate-900 ring-4 ring-emerald-400/30" : "bg-slate-200 text-slate-500"}`}>
              {i < current ? "✓" : i + 1}
            </div>
            <span className={`text-xs ${i === current ? "text-emerald-600" : "text-slate-500"}`}>{s}</span>
          </div>
          {i < STEPS.length - 1 && <div className={`w-12 h-px mb-5 ${i < current ? "bg-emerald-400" : "bg-slate-200"}`} />}
        </div>
      ))}
    </div>
  );
}

function CityStop({ stop, index, onChange, onRemove, canRemove, prevEnd }) {
  const minStart = prevEnd || "";
  return (
    <div className="bg-white/60 border border-[#ddd4c2] rounded-xl p-4 space-y-3">
      <div className="flex items-center justify-between">
        <span className="text-xs font-bold uppercase tracking-widest text-emerald-600">
          {index === 0 ? "🛫 First Stop" : `🗺️ Stop ${index + 1}`}
        </span>
        {canRemove && <button onClick={onRemove} className="text-slate-500 hover:text-red-600 text-xs">✕ Remove</button>}
      </div>
      <div className="relative">
        <label className={labelClass}>Destination</label>
        <input list="places" className={inputClass} placeholder="Search or type any city, state, or country..."
          value={stop.destination} onChange={(e) => onChange("destination", e.target.value)} />
        {stop.destination && <button onClick={() => onChange("destination", "")} className="absolute right-3 top-9 text-slate-500 hover:text-slate-900 text-sm">✕</button>}
      </div>
      <div className="grid grid-cols-2 gap-3">
        <div>
          <label className={labelClass}>Arrival</label>
          <input type="date" className={inputClass} value={stop.startDate} min={minStart}
            onChange={(e) => onChange("startDate", e.target.value)} />
        </div>
        <div>
          <label className={labelClass}>Departure</label>
          <input type="date" className={inputClass} value={stop.endDate} min={stop.startDate || minStart}
            onChange={(e) => onChange("endDate", e.target.value)} />
        </div>
      </div>
      {stop.startDate && stop.endDate && stop.startDate <= stop.endDate && (
        <div className="text-xs text-emerald-600/80 bg-emerald-400/10 rounded-lg px-3 py-2">
          📅 {nightsBetween(stop.startDate, stop.endDate)} nights in {stop.destination || "this city"}
        </div>
      )}
    </div>
  );
}

function App() {
  const [step, setStep] = useState(0);
  const [stops, setStops] = useState([emptyStop()]);
  const [form, setForm] = useState({ departureCity: "", travelMode: "flying", groupSize: "2", budget: "moderate", interests: [], pace: "balanced", includePoints: false, cardPortfolio: "", specialRequests: "" });
  const [loading, setLoading] = useState(false);
  const [paying, setPaying] = useState(false);
  const [streaming, setStreaming] = useState(false);
  const [itinerary, setItinerary] = useState(null);
  const [error, setError] = useState(null);
  const [copied, setCopied] = useState(false);

  const interestOptions = ["Food & Dining","History & Culture","Art & Museums","Nightlife","Nature & Hiking","Shopping","Architecture","Local Markets","Beaches","Adventure Sports","Spa & Wellness","Family-Friendly"];

  const update = (k, v) => setForm((f) => ({ ...f, [k]: v }));
  const updateStop = (i, k, v) => setStops((p) => p.map((s, idx) => idx === i ? { ...s, [k]: v } : s));
  const addStop = () => setStops((p) => [...p, emptyStop()]);
  const removeStop = (i) => setStops((p) => p.filter((_, idx) => idx !== i));
  const toggleInterest = (x) => setForm((f) => ({ ...f, interests: f.interests.includes(x) ? f.interests.filter((y) => y !== x) : [...f.interests, x] }));
  const totalNights = () => stops.reduce((t, s) => (s.startDate && s.endDate && s.startDate <= s.endDate ? t + nightsBetween(s.startDate, s.endDate) : t), 0);
  const isMulti = stops.length > 1;
  const canProceed = stops.some((s) => s.destination);

  const buildPrompt = () => {
    const pts = form.includePoints
      ? `\n\n## 💳 Points & Miles Strategy\nCards: ${form.cardPortfolio || "not specified"}. Best transfer partners, estimated point values for flights/hotels, and 2-3 specific booking tips.`
      : "";

    const mode = form.travelMode || "flying";
    const modeLabel = mode === "driving" ? "Road trip (self-drive)" : mode === "mixed" ? "Mixed (flights + driving)" : "Flying";
    const headerIcon = mode === "driving" ? "🚗" : mode === "mixed" ? "🧭" : "✈️";
    const driveRule = mode === "driving" || mode === "mixed"
      ? `\n4. On any day that involves driving between stops, state the drive time and distance for that leg inside the day's plan.`
      : "";
    const gettingAround = mode === "driving"
      ? `## 🚗 The Drive & Road-Trip Logistics
- Driving route connecting every stop in order, with estimated drive time AND distance for each leg.
- 2-3 scenic detours or worthwhile roadside stops along the way.
- Car rental advice, parking notes per city, fuel/EV-charging tips, tolls, and a quick road-trip packing note.`
      : mode === "mixed"
      ? `## 🧭 Getting Between Stops
- For each leg between cities, recommend the best option (flight, drive, or train) with rough time and cost, and why.
- For driving legs include drive time + one scenic stop; for flights include airport-transfer tips.
- How to get around within each city.`
      : `## 🚌 Getting Around
Transportation between cities (flights and airport transfers) and the best way to get around within each city.`;
    const detail = stops.map((s, i) => {
      const n = s.startDate && s.endDate ? nightsBetween(s.startDate, s.endDate) : "?";
      return `  Stop ${i + 1}: ${s.destination || "TBD"} — ${s.startDate || "?"} to ${s.endDate || "?"} (${n} nights)`;
    }).join("\n");
    const summary = isMulti ? `Multi-city trip:\n${detail}` : `${stops[0].destination} from ${stops[0].startDate || "TBD"} to ${stops[0].endDate || "TBD"} (${totalNights()} nights)`;

    const dayPlans = isMulti
      ? stops.filter((s) => s.destination).map((s) => {
          const n = s.startDate && s.endDate ? nightsBetween(s.startDate, s.endDate) : 3;
          const days = Array.from({ length: n }, (_, i) => `### Day ${i + 1}\n**Morning:** [activity + 1 specific tip]\n**Afternoon:** [activity + why it's worth it]\n**Evening:** [dinner spot + must-order dish]`).join("\n\n");
          return `## 📍 ${s.destination} (${s.startDate || "?"} – ${s.endDate || "?"})\n\n${days}`;
        }).join("\n\n")
      : (() => {
          const n = totalNights();
          const days = Array.from({ length: n }, (_, i) => `### Day ${i + 1}\n**Morning:** [activity + 1 specific tip]\n**Afternoon:** [activity + why it's worth it]\n**Evening:** [dinner spot + must-order dish]`).join("\n\n");
          return `## 🗓️ Day-by-Day Plan\n\n${days}`;
        })();

    return `You are an expert travel planner writing a premium itinerary for a paying client. Be specific and use REAL place names only.

TRIP:
- ${summary}
- Travel mode: ${modeLabel}
- ${mode === "flying" ? "Departing from" : "Starting from"}: ${form.departureCity || "not specified"}
- Group: ${form.groupSize} people
- Budget: ${form.budget}
- Pace: ${form.pace}
- Interests: ${form.interests.length ? form.interests.join(", ") : "general sightseeing"}
- Special requests: ${form.specialRequests || "none"}

CRITICAL RULES:
1. COMPLETENESS OVER LENGTH. You MUST finish the entire itinerary — every day AND every section through the final logistics section${form.includePoints ? ' and "Points & Miles Strategy"' : ''}. It is far better to be concise than to run out of room and cut off.
2. Keep each time block (Morning/Afternoon/Evening) to 1-2 tight sentences. Be specific but not wordy.
3. Fill in all ${totalNights()} days. Do not skip or summarize days.${driveRule}

Write the itinerary now, using exactly this structure:

# ${headerIcon} ${isMulti ? stops.map((s) => s.destination).filter(Boolean).join(" → ") : stops[0].destination} Itinerary

## 🗺️ Trip Overview
2-3 sentences on the overall vibe and what makes this trip special.

## 📋 Pre-Trip Checklist
- [5 practical pre-departure items: visas, vaccines, apps to download, currency, etc.]

${dayPlans}

## 🏨 Where to Stay
For each city: 1 budget pick, 1 mid-range, 1 splurge — with real hotel names and one reason to choose each.

## 🍽️ Don't-Miss Restaurants
For each city: 3 standout restaurants with cuisine type and the one dish to order.

## 💡 Local Tips
5 insider tips that most tourists miss.

${gettingAround}${pts}`;
  };

  // Step 1: send the customer to Stripe's secure payment page.
  const startCheckout = async () => {
    setPaying(true); setError(null);
    try {
      // Save the trip so we can generate it after the customer returns from Stripe.
      localStorage.setItem("explormint_pending", JSON.stringify({ prompt: buildPrompt(), stops, form }));
      const res = await fetch("/api/checkout", { method: "POST", headers: { "Content-Type": "application/json" } });
      const raw = await res.text();
      let data; try { data = JSON.parse(raw); } catch { data = {}; }
      if (!res.ok || !data.url) throw new Error(data.error || "Could not start checkout. Please try again.");
      window.location.href = data.url; // redirect to Stripe
    } catch (e) {
      setError(e.message);
      setPaying(false);
    }
  };

  // Step 2: after payment, generate the itinerary (server re-verifies the payment).
  const runGeneration = async (prompt, sessionId) => {
    setLoading(true); setError(null); setItinerary(null); setStreaming(false);
    let streamStarted = false;
    try {
      const res = await fetch("/api/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt, sessionId }),
      });

      if (!res.ok) {
        const raw = await res.text();
        let msg;
        try { msg = JSON.parse(raw).error; } catch { msg = null; }
        if (!msg) {
          msg = res.status === 504 || res.status === 524
            ? "The request timed out. Try fewer cities or a shorter trip."
            : `Server error (${res.status}). Please try again.`;
        }
        throw new Error(msg);
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let accumulated = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        accumulated += decoder.decode(value, { stream: true });
        if (!streamStarted) {
          streamStarted = true;
          setLoading(false);
          setStreaming(true);
          setStep(2);
        }
        setItinerary(accumulated);
      }

      if (!accumulated.trim()) throw new Error("Empty response from the server.");
      setStreaming(false);
      localStorage.removeItem("explormint_pending"); // consumed — don't regenerate on refresh
    } catch (e) {
      setError(e.message);
      setLoading(false);
      setStreaming(false);
    }
  };

  // On return from Stripe: ?paid=<session_id> means payment succeeded → generate.
  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const paid = params.get("paid");
    const canceled = params.get("canceled");
    if (paid) {
      window.history.replaceState({}, "", window.location.pathname); // clean the URL
      let pending = null;
      try { pending = JSON.parse(localStorage.getItem("explormint_pending")); } catch {}
      if (pending && pending.prompt) {
        if (pending.stops) setStops(pending.stops);
        if (pending.form) setForm(pending.form);
        setStep(2);
        runGeneration(pending.prompt, paid);
      } else {
        setError("Payment succeeded, but we couldn't find your trip details (they may have been cleared). Please re-enter your trip — and contact support if you were charged without receiving an itinerary.");
      }
    } else if (canceled) {
      window.history.replaceState({}, "", window.location.pathname);
      setError("Payment canceled — you have not been charged. You can try again whenever you're ready.");
    }
  }, []);

  const copy = () => { navigator.clipboard.writeText(itinerary); setCopied(true); setTimeout(() => setCopied(false), 2000); };
  const reset = () => { setStep(0); setItinerary(null); setError(null); setStreaming(false); setStops([emptyStop()]); setForm({ departureCity: "", travelMode: "flying", groupSize: "2", budget: "moderate", interests: [], pace: "balanced", includePoints: false, cardPortfolio: "", specialRequests: "" }); };

  // Convert the markdown itinerary into a clean white print document, then open
  // the browser's print dialog where the user chooses "Save as PDF".
  const downloadPDF = () => {
    const esc = (s) => s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    const inline = (s) => esc(s).replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
    const lines = itinerary.split("\n");
    let html = "";
    let inList = false;
    const closeList = () => { if (inList) { html += "</ul>"; inList = false; } };
    for (const line of lines) {
      if (line.startsWith("# ")) { closeList(); html += `<h1>${inline(line.slice(2))}</h1>`; }
      else if (line.startsWith("## ")) { closeList(); html += `<h2>${inline(line.slice(3))}</h2>`; }
      else if (line.startsWith("### ")) { closeList(); html += `<h3>${inline(line.slice(4))}</h3>`; }
      else if (line.startsWith("- ") || line.startsWith("* ")) { if (!inList) { html += "<ul>"; inList = true; } html += `<li>${inline(line.slice(2))}</li>`; }
      else if (line.trim() === "") { closeList(); }
      else { closeList(); html += `<p>${inline(line)}</p>`; }
    }
    closeList();

    const title = stops.filter((s) => s.destination).map((s) => s.destination).join(" → ") || "Itinerary";
    const doc = `<!DOCTYPE html><html><head><meta charset="utf-8"><title>${esc(title)} Itinerary</title><style>
      @page { margin: 18mm 16mm; }
      * { box-sizing: border-box; }
      body { font-family: 'Helvetica Neue', Arial, sans-serif; color: #1e293b; line-height: 1.55; max-width: 760px; margin: 0 auto; padding: 24px; }
      .brand { border-bottom: 3px solid #10b981; padding-bottom: 12px; margin-bottom: 24px; }
      .brand .name { font-size: 22px; font-weight: 800; letter-spacing: .5px; color: #047857; }
      .brand .tag { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: #059669; font-weight: 700; }
      h1 { font-size: 24px; color: #0f172a; margin: 18px 0 8px; }
      h2 { font-size: 17px; color: #0f172a; margin: 22px 0 6px; border-bottom: 1px solid #e2e8f0; padding-bottom: 4px; }
      h3 { font-size: 14px; color: #059669; margin: 14px 0 4px; }
      p { font-size: 12.5px; margin: 4px 0; }
      ul { margin: 4px 0 4px 18px; padding: 0; }
      li { font-size: 12.5px; margin: 3px 0; }
      strong { color: #0f172a; }
      .footer { margin-top: 28px; padding-top: 12px; border-top: 1px solid #e2e8f0; font-size: 10px; color: #94a3b8; text-align: center; }
      h1, h2, h3 { page-break-after: avoid; }
      li, p { page-break-inside: avoid; }
    </style></head><body>
      <div class="brand"><div class="tag">Freshly Minted Itineraries</div><div class="name">Explormint</div></div>
      ${html}
      <div class="footer">Prepared by Explormint · ${new Date().toLocaleDateString()}</div>
    </body></html>`;

    const w = window.open("", "_blank");
    if (!w) { alert("Please allow pop-ups for this site to download the PDF."); return; }
    w.document.write(doc);
    w.document.close();
    w.focus();
    // Give the new window a moment to render before opening the print dialog.
    setTimeout(() => { w.print(); }, 400);
  };

  const renderItinerary = (text) => text.split("\n").map((line, i) => {
    if (line.startsWith("# ")) return <h1 key={i} className="text-2xl font-bold text-emerald-600 mt-6 mb-3">{line.slice(2)}</h1>;
    if (line.startsWith("## ")) return <h2 key={i} className="text-lg font-bold text-slate-900 mt-6 mb-2 border-b border-[#e7e0d0] pb-1">{line.slice(3)}</h2>;
    if (line.startsWith("### ")) return <h3 key={i} className="text-base font-semibold text-emerald-700 mt-4 mb-1">{line.slice(4)}</h3>;
    if (line.startsWith("- ") || line.startsWith("* ")) {
      const parts = line.slice(2).split(/\*\*(.*?)\*\*/g);
      return <li key={i} className="ml-4 mb-1 text-slate-700 text-sm list-disc">{parts.map((p, j) => j % 2 ? <strong key={j} className="text-slate-900">{p}</strong> : p)}</li>;
    }
    if (line.trim() === "") return <div key={i} className="h-2" />;
    const parts = line.split(/\*\*(.*?)\*\*/g);
    return <p key={i} className="text-slate-700 text-sm mb-1">{parts.map((p, j) => j % 2 ? <strong key={j} className="text-slate-900">{p}</strong> : p)}</p>;
  });

  return (
    <div className="min-h-screen text-slate-900">
      <div className="border-b border-[#e7e0d0] px-6 py-5">
        <div className="max-w-2xl mx-auto flex items-center justify-between">
          <div>
            <div className="text-emerald-600 text-xs font-bold tracking-widest uppercase mb-1">Freshly Minted Itineraries</div>
            <h1 className="text-xl font-bold bg-gradient-to-r from-emerald-500 to-teal-600 bg-clip-text text-transparent">Explormint</h1>
          </div>
          <div className="text-right">
            <div className="text-xs text-slate-500">Powered by AI</div>
            <div className="text-xs text-slate-500">48-hr delivery service</div>
          </div>
        </div>
      </div>

      <div className="max-w-2xl mx-auto px-6 py-10">
        {!itinerary && <StepIndicator current={step} />}

        {step === 0 && (
          <div className="space-y-6">
            <div><h2 className="text-2xl font-bold mb-1">Where are you headed?</h2><p className="text-slate-500 text-sm">Add one city or build a multi-city route.</p></div>
            <div className="space-y-4">
              {stops.map((stop, i) => (
                <CityStop key={i} stop={stop} index={i} onChange={(k, v) => updateStop(i, k, v)} onRemove={() => removeStop(i)} canRemove={stops.length > 1} prevEnd={i > 0 ? stops[i - 1].endDate : ""} />
              ))}
            </div>
            {stops.length < 6 && <button onClick={addStop} className="w-full py-3 border border-dashed border-[#ddd4c2] hover:border-emerald-400 text-slate-500 hover:text-emerald-600 rounded-xl text-sm font-semibold transition-all">+ Add Another City</button>}
            {totalNights() > 0 && <div className="bg-emerald-400/10 border border-emerald-400/30 rounded-xl px-4 py-3 text-sm text-emerald-700">🗺️ {stops.filter((s) => s.destination).length} {stops.filter((s) => s.destination).length === 1 ? "city" : "cities"} · {totalNights()} total nights</div>}
            <div>
              <label className={labelClass}>How are you traveling?</label>
              <div className="grid grid-cols-3 gap-3">
                {[["flying","✈️ Flying"],["driving","🚗 Road Trip"],["mixed","🧭 Mixed"]].map(([v, l]) => (
                  <button key={v} onClick={() => update("travelMode", v)} className={`py-3 rounded-xl text-sm font-semibold border transition-all ${form.travelMode === v ? "bg-emerald-400 text-slate-900 border-emerald-400" : "bg-white text-slate-700 border-[#ddd4c2] hover:border-emerald-400"}`}>{l}</button>
                ))}
              </div>
            </div>
            <div className="grid grid-cols-2 gap-4">
              <div><label className={labelClass}>{form.travelMode === "flying" ? "Departing From" : "Starting From"}</label><input list={form.travelMode === "flying" ? "airports" : "places"} className={inputClass} placeholder={form.travelMode === "flying" ? "Search airports, e.g. Cincinnati (CVG)" : "Search or type a city/state"} value={form.departureCity} onChange={(e) => update("departureCity", e.target.value)} /></div>
              <div><label className={labelClass}>Group Size</label><select className={inputClass} value={form.groupSize} onChange={(e) => update("groupSize", e.target.value)}>{["1","2","3","4","5","6","7","8","10","12"].map((n) => <option key={n} value={n}>{n} {n === "1" ? "person" : "people"}</option>)}</select></div>
            </div>
            <button onClick={() => canProceed && setStep(1)} disabled={!canProceed} className="w-full py-4 bg-emerald-400 hover:bg-emerald-300 disabled:bg-slate-200 disabled:text-slate-500 text-slate-900 font-bold rounded-xl transition-colors">Continue →</button>
          </div>
        )}

        {step === 1 && (
          <div className="space-y-6">
            <div><h2 className="text-2xl font-bold mb-1">How do you travel?</h2><p className="text-slate-500 text-sm">This shapes every recommendation we make.</p></div>
            <div><label className={labelClass}>Budget Level</label><div className="grid grid-cols-3 gap-3">{[["budget","💰 Budget"],["moderate","💳 Moderate"],["luxury","✨ Luxury"]].map(([v, l]) => <button key={v} onClick={() => update("budget", v)} className={`py-3 rounded-xl text-sm font-semibold border transition-all ${form.budget === v ? "bg-emerald-400 text-slate-900 border-emerald-400" : "bg-white text-slate-700 border-[#ddd4c2] hover:border-emerald-400"}`}>{l}</button>)}</div></div>
            <div><label className={labelClass}>Travel Pace</label><div className="grid grid-cols-3 gap-3">{[["relaxed","🌿 Relaxed"],["balanced","⚖️ Balanced"],["packed","⚡ Packed"]].map(([v, l]) => <button key={v} onClick={() => update("pace", v)} className={`py-3 rounded-xl text-sm font-semibold border transition-all ${form.pace === v ? "bg-emerald-400 text-slate-900 border-emerald-400" : "bg-white text-slate-700 border-[#ddd4c2] hover:border-emerald-400"}`}>{l}</button>)}</div></div>
            <div><label className={labelClass}>Interests (pick all that apply)</label><div className="flex flex-wrap gap-2">{interestOptions.map((x) => <button key={x} onClick={() => toggleInterest(x)} className={`px-3 py-2 rounded-lg text-xs font-semibold border transition-all ${form.interests.includes(x) ? "bg-emerald-400 text-slate-900 border-emerald-400" : "bg-white text-slate-700 border-[#ddd4c2] hover:border-emerald-400"}`}>{x}</button>)}</div></div>
            <div className="bg-white border border-[#ddd4c2] rounded-xl p-4">
              <div className="flex items-center justify-between mb-3">
                <div><div className="font-semibold text-sm">💳 Add Points & Miles Strategy</div><div className="text-xs text-slate-500 mt-0.5">Get personalized redemption advice for your cards</div></div>
                <button onClick={() => update("includePoints", !form.includePoints)} className={`w-12 h-6 rounded-full transition-colors relative ${form.includePoints ? "bg-emerald-400" : "bg-slate-300"}`}><div className={`w-5 h-5 bg-white rounded-full absolute top-0.5 transition-all ${form.includePoints ? "left-6" : "left-0.5"}`} /></button>
              </div>
              {form.includePoints && <div><label className={labelClass}>Your Credit Cards</label><input className={inputClass} placeholder="e.g. Capital One Venture X, Chase Sapphire Preferred" value={form.cardPortfolio} onChange={(e) => update("cardPortfolio", e.target.value)} /></div>}
            </div>
            <div><label className={labelClass}>Special Requests</label><textarea className={`${inputClass} resize-none`} rows={3} placeholder="Dietary restrictions, accessibility needs, must-see spots, anniversary trip, etc." value={form.specialRequests} onChange={(e) => update("specialRequests", e.target.value)} /></div>
            <div className="flex gap-3">
              <button onClick={() => setStep(0)} disabled={paying} className="px-6 py-4 bg-white hover:bg-slate-200 disabled:opacity-50 text-slate-900 font-bold rounded-xl transition-colors">← Back</button>
              <button onClick={startCheckout} disabled={paying} className="flex-1 py-4 bg-emerald-400 hover:bg-emerald-300 disabled:opacity-60 text-slate-900 font-bold rounded-xl transition-colors">{paying ? "Redirecting to secure checkout…" : `Pay & Generate · ${PRICE_LABEL} ✈️`}</button>
            </div>
            <p className="text-center text-xs text-slate-500">🔒 Secure payment via Stripe · You'll be charged {PRICE_LABEL} for one custom itinerary</p>
          </div>
        )}

        {loading && (
          <div className="text-center py-20">
            <div className="text-5xl mb-6 animate-bounce">✈️</div>
            <div className="text-xl font-bold mb-2">Building your itinerary...</div>
            <div className="text-slate-500 text-sm">Crafting your {stops.filter((s) => s.destination).map((s) => s.destination).join(" → ")} plan</div>
            <div className="mt-6 flex justify-center gap-1">{[0,1,2].map((i) => <div key={i} className="w-2 h-2 bg-emerald-400 rounded-full animate-bounce" style={{ animationDelay: `${i * 0.2}s` }} />)}</div>
          </div>
        )}

        {error && <div className="bg-red-50 border border-red-300 rounded-xl p-4 text-red-700 text-sm">{error}<button onClick={() => setError(null)} className="block mt-2 text-red-600 underline">Try again</button></div>}

        {itinerary && !loading && (
          <div>
            <div className="flex items-center justify-between mb-6">
              <div>
                <h2 className="text-xl font-bold">{streaming ? "Generating your itinerary…" : "Your Itinerary is Ready"}</h2>
                <p className="text-slate-500 text-sm mt-1">{stops.filter((s) => s.destination).map((s) => s.destination).join(" → ")} · {totalNights()} nights</p>
              </div>
              <div className="flex gap-2">
                {!streaming && <button onClick={copy} className="px-4 py-2 bg-slate-200 hover:bg-slate-300 text-slate-900 text-sm font-semibold rounded-lg transition-colors">{copied ? "✓ Copied!" : "Copy"}</button>}
                {!streaming && <button onClick={downloadPDF} className="px-4 py-2 bg-slate-200 hover:bg-slate-300 text-slate-900 text-sm font-semibold rounded-lg transition-colors">📄 PDF</button>}
                <button onClick={reset} className="px-4 py-2 bg-emerald-400 hover:bg-emerald-300 text-slate-900 text-sm font-semibold rounded-lg transition-colors">New Trip</button>
              </div>
            </div>
            {streaming && (
              <div className="flex items-center gap-2 mb-4 text-emerald-600 text-xs font-semibold">
                <div className="flex gap-1">{[0,1,2].map((i) => <div key={i} className="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-bounce" style={{ animationDelay: `${i * 0.2}s` }} />)}</div>
                Writing your itinerary — it will appear below as Claude writes it
              </div>
            )}
            <div className="bg-white border border-[#e7e0d0] rounded-2xl p-6 space-y-1">{renderItinerary(itinerary)}</div>
            {!streaming && <div className="mt-6 bg-white/50 border border-[#e7e0d0] rounded-xl p-4 text-center"><p className="text-xs text-slate-500">🎯 <span className="text-slate-700 font-semibold">Pro tip:</span> Review this output, add your personal touches, then deliver it as a branded PDF to your client.</p></div>}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
